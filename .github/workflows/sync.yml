name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # This natively handles your binary/image files

      - name: Push to Hub
        uses: huggingface/hub-sync@v1
        with:
          github_repo_id: SaugatXthaa/HerumHai
          huggingface_repo_id: SaugatXthaa/HerumHai
          hf_token: ${{ secrets.HF_TOKEN }}
