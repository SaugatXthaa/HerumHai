name: Push to Hugging Face

on:
  push:
    branches: [ main ] 

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Force Push to Space Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://SaugatXthaa:$HF_TOKEN@huggingface.co/spaces/SaugatXthaa/HerumHai main
          
